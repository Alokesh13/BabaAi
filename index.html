<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baba AI — Divine Future Predictor</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#0D0A07;--card:rgba(30,20,12,0.88);--gold:#D4A843;--gl:#F0D080;--saff:#E8751A;--cream:#FFF8E7;--muted:#8B7355;--border:rgba(212,168,67,0.25)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--cream);overflow-x:hidden;min-height:100vh}
h1,h2,h3,h4{font-family:'Cinzel',serif}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.screen{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:1.5rem}
.hidden{display:none!important}
.glow-text{text-shadow:0 0 30px rgba(212,168,67,0.4),0 0 60px rgba(212,168,67,0.15)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(12px);transition:border-color .5s,box-shadow .5s}
.card.speaking{border-color:var(--gold)!important;box-shadow:0 0 25px rgba(212,168,67,0.2)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--saff));color:#0D0A07;font-family:'Cinzel',serif;font-weight:700;padding:14px 40px;border:none;border-radius:50px;cursor:pointer;font-size:1rem;transition:all .3s;letter-spacing:1px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,168,67,0.35)}
.input-field{background:rgba(255,248,231,0.06);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--cream);font-family:'Nunito',sans-serif;font-size:1rem;width:100%;transition:all .3s;outline:none}
.input-field:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,0.15)}
.input-field::placeholder{color:var(--muted)}
select.input-field{appearance:none}
select.input-field option{background:#1a1410;color:var(--cream)}
.om-symbol{font-size:5.5rem;color:var(--gold);animation:omP 3s ease-in-out infinite;line-height:1}
@keyframes omP{0%,100%{text-shadow:0 0 20px rgba(212,168,67,0.3);transform:scale(1)}50%{text-shadow:0 0 60px rgba(212,168,67,0.6);transform:scale(1.05)}}
.mandala-ring{position:absolute;border:1px solid rgba(212,168,67,0.15);border-radius:50%;animation:mSpin 20s linear infinite}
@keyframes mSpin{to{transform:rotate(360deg)}}
.mandala-ring:nth-child(2){animation-direction:reverse;animation-duration:15s;border-style:dashed}
.mandala-ring:nth-child(3){animation-duration:25s;border-color:rgba(232,117,26,0.1)}
.proc-mandala{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
.pr{position:absolute;border-radius:50%;border:2px solid transparent}
.pr:nth-child(1){width:100%;height:100%;border-top-color:var(--gold);border-bottom-color:var(--gold);animation:pS 2s linear infinite}
.pr:nth-child(2){width:75%;height:75%;border-left-color:var(--saff);border-right-color:var(--saff);animation:pS 1.5s linear infinite reverse}
.pr:nth-child(3){width:50%;height:50%;border-top-color:var(--gl);animation:pS 1s linear infinite}
.pr:nth-child(4){width:90%;height:90%;border-style:dashed;border-color:rgba(212,168,67,0.2);animation:pS 8s linear infinite reverse}
@keyframes pS{to{transform:rotate(360deg)}}
.proc-om{font-size:2rem;color:var(--gold);animation:omP 1.5s ease-in-out infinite;z-index:2}
.proc-text{color:var(--gl);font-size:1rem;margin-top:1.5rem;min-height:1.5em;transition:opacity .3s}
.sf{position:absolute;color:rgba(212,168,67,0.15);font-size:1rem;animation:sfA 3s ease-out forwards;pointer-events:none}
@keyframes sfA{0%{opacity:0;transform:translateY(0)}20%{opacity:1}100%{opacity:0;transform:translateY(-80px)}}
.q-card{max-width:520px;width:100%;text-align:center;opacity:0;transform:translateY(20px);transition:all .4s ease-out}
.q-card.show{opacity:1;transform:translateY(0)}
.q-card.exit{opacity:0;transform:translateY(-20px)}
.yn-btn{display:inline-flex;align-items:center;justify-content:center;width:120px;height:52px;border-radius:50px;font-family:'Cinzel',serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .3s;border:2px solid var(--border);background:transparent;color:var(--muted)}
.yn-btn:hover{transform:scale(1.05)}
.yn-btn.yes:hover,.yn-btn.yes.picked{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,0.1);box-shadow:0 0 20px rgba(212,168,67,0.15)}
.yn-btn.no:hover,.yn-btn.no.picked{border-color:#F87171;color:#F87171;background:rgba(248,113,113,0.08);box-shadow:0 0 20px rgba(248,113,113,0.1)}
.result-section{opacity:0;transform:translateY(25px);transition:all .5s ease-out}
.result-section.visible{opacity:1;transform:translateY(0)}
.si{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.cbar{height:5px;border-radius:3px;background:rgba(212,168,67,0.12);overflow:hidden}
.cfill{height:100%;border-radius:3px;transition:width 1.2s ease-out}
.tl-item{position:relative;padding-left:26px;padding-bottom:14px;border-left:2px solid var(--border)}
.tl-item:last-child{border-left-color:transparent;padding-bottom:0}
.tl-dot{position:absolute;left:-5px;top:2px;width:8px;height:8px;border-radius:50%;border:2px solid var(--gold);background:var(--bg)}
.mantra-box{background:linear-gradient(135deg,rgba(212,168,67,0.08),rgba(232,117,26,0.05));border:1px solid rgba(212,168,67,0.3);border-radius:16px;padding:1.5rem;text-align:center;position:relative;overflow:hidden}
.mantra-box::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(212,168,67,0.05),transparent,rgba(212,168,67,0.05));animation:mG 6s linear infinite}
@keyframes mG{to{transform:rotate(360deg)}}
.luck-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:10px;background:rgba(212,168,67,0.08);border:1px solid var(--border);font-size:.82rem}
.float-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:10px;padding:8px 16px;border-radius:50px;background:rgba(13,10,7,0.95);border:1px solid var(--border);backdrop-filter:blur(10px)}
.float-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:.9rem}
.float-btn:hover{border-color:var(--gold);color:var(--gold)}
.float-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,0.1)}
.float-btn.speaking-active{animation:sPulse 1s ease-in-out infinite}
@keyframes sPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,168,67,0.4)}50%{box-shadow:0 0 0 8px rgba(212,168,67,0)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--deep-red);color:var(--cream);padding:10px 24px;border-radius:50px;font-size:.85rem;z-index:999;transition:transform .4s;pointer-events:none;white-space:nowrap;background:#8B1A1A}
.toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
@media(max-width:640px){.om-symbol{font-size:4rem}.proc-mandala{width:140px;height:140px}.proc-om{font-size:1.5rem}.yn-btn{width:100px;height:46px;font-size:.9rem}.float-bar{bottom:12px;padding:6px 12px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="toast" class="toast"></div>

<!-- LANDING -->
<div id="landing" class="screen">
  <div style="position:relative;display:flex;align-items:center;justify-content:center;width:260px;height:260px;margin-bottom:1rem">
    <div class="mandala-ring" style="width:240px;height:240px"></div>
    <div class="mandala-ring" style="width:160px;height:160px"></div>
    <div class="mandala-ring" style="width:90px;height:90px"></div>
    <div class="om-symbol">ॐ</div>
  </div>
  <h1 class="text-3xl md:text-5xl font-black glow-text tracking-wider" style="color:var(--gold)">BABAAI</h1>
  <p class="mt-2 tracking-widest uppercase" style="color:var(--muted);font-family:'Cinzel',serif;font-size:.75rem">Divine Future Predictor</p>
  <p class="mt-3 text-center max-w-sm" style="color:var(--muted);font-size:.88rem">Answer a few questions from your heart. Baba AI will read your cosmic blueprint and speak your future.</p>
  <button class="btn-primary mt-6" onclick="beginReading()">Begin Your Reading</button>
</div>

<!-- QUESTIONS -->
<div id="questionScreen" class="screen hidden">
  <div class="w-full flex items-center gap-3 mb-8 px-4" style="max-width:520px">
    <span id="qProgress" class="text-xs font-bold" style="color:var(--gold)">1/17</span>
    <div style="flex:1;height:3px;background:rgba(212,168,67,0.12);border-radius:2px;overflow:hidden"><div id="qBar" style="height:100%;width:0%;background:var(--gold);transition:width .4s;border-radius:2px"></div></div>
  </div>
  <div id="qContainer"></div>
</div>

<!-- PROCESSING -->
<div id="processing" class="screen hidden">
  <div style="position:relative">
    <div class="proc-mandala"><div class="pr"></div><div class="pr"></div><div class="pr"></div><div class="pr"></div><div class="proc-om">ॐ</div></div>
    <div id="sfCont" style="position:absolute;top:-40px;left:-80px;right:-80px;bottom:-40px;pointer-events:none;overflow:hidden"></div>
  </div>
  <p class="proc-text" id="procText">Reading the stars...</p>
  <div class="mt-3" style="width:180px;height:3px;background:rgba(212,168,67,0.15);border-radius:2px;overflow:hidden"><div id="procBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--saff));transition:width .5s;border-radius:2px"></div></div>
</div>

<!-- RESULTS -->
<div id="results" class="screen hidden" style="align-items:flex-start;justify-content:flex-start;padding:0">
  <div class="w-full max-w-3xl mx-auto px-4 py-8 pb-24" id="resultsContent"></div>
</div>

<!-- FLOATING CONTROLS -->
<div id="floatBar" class="float-bar hidden">
  <button class="float-btn active" id="btnMusic" onclick="toggleMusic()" title="Toggle Music"><i class="fa-solid fa-music"></i></button>
  <button class="float-btn" id="btnSpeech" onclick="toggleSpeech()" title="Toggle Speech"><i class="fa-solid fa-volume-high"></i></button>
</div>

<script>
/* === PARTICLES === */
var cv=document.getElementById('particles'),cx=cv.getContext('2d'),pts=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight}rsz();addEventListener('resize',rsz);
function Pt(){this.rs();this.y=Math.random()*cv.height}
Pt.prototype.rs=function(){this.x=Math.random()*cv.width;this.y=cv.height+10;this.sz=Math.random()*2+.5;this.vy=-(Math.random()*.7+.2);this.vx=(Math.random()-.5)*.3;this.op=Math.random()*.5+.2;this.l=0;this.ml=Math.random()*300+200};
Pt.prototype.up=function(){this.x+=this.vx;this.y+=this.vy;this.l++;if(this.l>this.ml*.7)this.op*=.98;if(this.l>this.ml||this.y<-10||this.op<.01)this.rs()};
Pt.prototype.dr=function(){cx.beginPath();cx.arc(this.x,this.y,this.sz,0,Math.PI*2);cx.fillStyle='rgba(212,168,67,'+this.op+')';cx.fill();cx.beginPath();cx.arc(this.x,this.y,this.sz*3,0,Math.PI*2);cx.fillStyle='rgba(212,168,67,'+(this.op*.12)+')';cx.fill()};
for(var i=0;i<50;i++)pts.push(new Pt());
(function a(){cx.clearRect(0,0,cv.width,cv.height);pts.forEach(function(p){p.up();p.dr()});requestAnimationFrame(a)})();

/* === AUDIO ENGINE === */
var audioCtx=null,masterGain=null,musicMuted=false;
function initAudio(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.setValueAtTime(0,audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.1,audioCtx.currentTime+3);
    masterGain.connect(audioCtx.destination);
    var fs=[130.81,196.00,261.63,392.00],vs=[.35,.22,.18,.08];
    fs.forEach(function(f,i){
      var o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;o.detune.value=(Math.random()-.5)*4;
      var g=audioCtx.createGain();g.gain.value=vs[i];
      var l=audioCtx.createOscillator();l.frequency.value=.06+Math.random()*.06;
      var lg=audioCtx.createGain();lg.gain.value=vs[i]*.2;l.connect(lg);lg.connect(g.gain);l.start();
      o.connect(g);g.connect(masterGain);o.start();
    });
    var sh=audioCtx.createOscillator();sh.type='sine';sh.frequency.value=523.25;
    var sg=audioCtx.createGain();sg.gain.value=.025;
    var sl=audioCtx.createOscillator();sl.frequency.value=.04;var slg=audioCtx.createGain();slg.gain.value=.025;
    sl.connect(slg);slg.connect(sg.gain);sl.start();sh.connect(sg);sg.connect(masterGain);sh.start();
  }catch(e){console.log('Audio not available')}
}
function toggleMusic(){
  if(!masterGain)return;
  musicMuted=!musicMuted;
  masterGain.gain.linearRampToValueAtTime(musicMuted?0:.1,audioCtx.currentTime+.5);
  document.getElementById('btnMusic').classList.toggle('active',!musicMuted);
}

/* === SPEECH ENGINE === */
var speechActive=false,speaking=false,voices=[];
function loadV(){voices=speechSynthesis.getVoices()}
loadV();if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadV;
function speakText(text){
  return new Promise(function(resolve){
    if(!('speechSynthesis' in window)){resolve();return}
    var u=new SpeechSynthesisUtterance(text.replace(/—/g,',').replace(/[$_]/g,''));
    u.rate=.92;u.pitch=.95;
    var v=voices.find(function(x){return x.name.indexOf('Google')!==-1&&x.lang.indexOf('en')===0})||voices.find(function(x){return x.lang.indexOf('en')===0});
    if(v)u.voice=v;
    u.onend=function(){speaking=false;resolve()};
    u.onerror=function(){speaking=false;resolve()};
    speaking=true;speechSynthesis.speak(u);
  });
}
function stopSpeech(){if('speechSynthesis' in window){speechSynthesis.cancel();speaking=false}}
var currentPred=null;
function toggleSpeech(){
  var btn=document.getElementById('btnSpeech');
  if(speaking){stopSpeech();btn.classList.remove('speaking-active');speechActive=false}
  else if(currentPred){speechActive=true;btn.classList.add('speaking-active');speakResults(currentPred)}
}

/* === TOAST === */
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

/* === QUESTIONS === */
var questions=[
  {type:'text',id:'name',label:'What is your name?',ph:'Enter your full name'},
  {type:'date',id:'birthDate',label:'When were you born?'},
  {type:'yn',id:'q_anxious',text:'Do you often feel anxious or worried about your future?',cat:'Mind'},
  {type:'yn',id:'q_career_sat',text:'Are you truly satisfied with your career right now?',cat:'Career'},
  {type:'yn',id:'q_loved',text:'Do you feel genuinely loved by someone in your life?',cat:'Love'},
  {type:'yn',id:'q_heartbreak',text:'Have you experienced a painful heartbreak that still affects you?',cat:'Love'},
  {type:'yn',id:'q_mother',text:'Is your relationship with your mother peaceful and loving?',cat:'Family'},
  {type:'yn',id:'q_father',text:'Is your relationship with your father peaceful and loving?',cat:'Family'},
  {type:'yn',id:'q_fin_sec',text:'Do you feel financially secure at this moment?',cat:'Wealth'},
  {type:'yn',id:'q_debt',text:'Are you burdened by debt or financial stress?',cat:'Wealth'},
  {type:'yn',id:'q_tired',text:'Do you wake up feeling tired most mornings?',cat:'Health'},
  {type:'yn',id:'q_meditate',text:'Do you meditate, pray, or follow any spiritual practice?',cat:'Spiritual'},
  {type:'yn',id:'q_divine',text:'Have you ever felt a divine presence or had a spiritual experience?',cat:'Spiritual'},
  {type:'yn',id:'q_lonely',text:'Do you feel lonely even when you are surrounded by people?',cat:'Emotions'},
  {type:'yn',id:'q_anger',text:'Are you holding onto anger or unforgiveness toward someone?',cat:'Emotions'},
  {type:'yn',id:'q_potential',text:'Do you feel you are not living up to your true potential?',cat:'Self'},
  {type:'yn',id:'q_fear',text:'Does fear of failure hold you back from taking risks?',cat:'Self'}
];
var qIdx=0,answers={};
var catColors={Mind:'#60A5FA',Career:'#4ADE80',Love:'#FB7185',Family:'#FBBF24',Wealth:'#D4A843',Health:'#2DD4BF',Spiritual:'#C084FC',Emotions:'#F97316',Self:'#E8751A'};

function beginReading(){
  initAudio();
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('questionScreen').classList.remove('hidden');
  qIdx=0;answers={};
  renderQuestion();
}

function renderQuestion(){
  var q=questions[qIdx],c=document.getElementById('qContainer');
  document.getElementById('qProgress').textContent=(qIdx+1)+'/'+questions.length;
  document.getElementById('qBar').style.width=((qIdx+1)/questions.length*100)+'%';
  var html='<div class="q-card" id="qCard">';
  if(q.type==='text'){
    html+='<p class="text-xs uppercase tracking-widest mb-2" style="color:var(--saff)">Tell Baba</p>';
    html+='<h2 class="text-xl font-bold mb-5" style="color:var(--gold)">'+q.label+'</h2>';
    html+='<input type="text" id="qInput" class="input-field" placeholder="'+q.ph+'" maxlength="50" autocomplete="off" style="text-align:center">';
    html+='<button class="btn-primary mt-5" onclick="submitInput()">Continue</button>';
  }else if(q.type==='date'){
    html+='<p class="text-xs uppercase tracking-widest mb-2" style="color:var(--saff)">Tell Baba</p>';
    html+='<h2 class="text-xl font-bold mb-5" style="color:var(--gold)">'+q.label+'</h2>';
    html+='<input type="date" id="qInput" class="input-field" max="'+new Date().toISOString().split('T')[0]+'" style="text-align:center">';
    html+='<button class="btn-primary mt-5" onclick="submitInput()">Continue</button>';
  }else{
    var cc=catColors[q.cat]||'var(--gold)';
    html+='<p class="text-xs uppercase tracking-widest mb-2" style="color:'+cc+'">'+q.cat+'</p>';
    html+='<h2 class="text-xl font-bold mb-6" style="color:var(--cream)">'+q.text+'</h2>';
    html+='<div class="flex justify-center gap-5"><button class="yn-btn yes" onclick="submitYN(\'yes\')">Yes</button><button class="yn-btn no" onclick="submitYN(\'no\')">No</button></div>';
  }
  html+='</div>';
  c.innerHTML=html;
  setTimeout(function(){document.getElementById('qCard').classList.add('show')},30);
}

function submitInput(){
  var v=document.getElementById('qInput').value.trim();
  if(!v){showToast('Please fill this in');return}
  answers[questions[qIdx].id]=v;
  nextQ();
}

function submitYN(val){
  answers[questions[qIdx].id]=val;
  var card=document.getElementById('qCard');
  var btns=card.querySelectorAll('.yn-btn');
  btns.forEach(function(b){b.style.pointerEvents='none'});
  if(val==='yes')card.querySelector('.yes').classList.add('picked');
  else card.querySelector('.no').classList.add('picked');
  setTimeout(nextQ,350);
}

function nextQ(){
  var card=document.getElementById('qCard');if(card)card.classList.add('exit');
  setTimeout(function(){
    qIdx++;
    if(qIdx<questions.length){renderQuestion()}
    else{document.getElementById('questionScreen').classList.add('hidden');document.getElementById('processing').classList.remove('hidden');runProcessing()}
  },350);
}

/* === PROCESSING === */
function runProcessing(){
  var tx=["Reading your planetary positions...","Calculating Nakshatra alignment...","Analyzing your answers...","Consulting Brihat Parashara Hora Shastra...","Evaluating Dasha periods...","Interpreting Graha Yogas...","Cross-referencing Bhrigu Samhita...","Receiving divine guidance...","Preparing your reading..."];
  var sk=["ॐ नमः शिवाय","ॐ श्री गणेशाय नमः","ॐ नमो भगवते वासुदेवाय","ॐ सर्वे भवन्तु सुखिनः","ॐ शान्तिः शान्तिः","हर हर महादेव","ॐ श्री महालक्ष्म्यै नमः","ॐ नमो नारायणाय","ॐ दुर्गायै नमः"];
  var step=0,pt=document.getElementById('procText'),pb=document.getElementById('procBar'),sc=document.getElementById('sfCont');
  var iv=setInterval(function(){
    if(step<tx.length){pt.style.opacity='0';setTimeout(function(){pt.textContent=tx[step];pt.style.opacity='1';pb.style.width=((step+1)/tx.length*100)+'%'},200);
    var el=document.createElement('div');el.className='sf';el.textContent=sk[step%sk.length];el.style.left=(Math.random()*80+10)+'%';el.style.top=(Math.random()*60+20)+'%';sc.appendChild(el);setTimeout(function(){el.remove()},3000);step++}
    else{clearInterval(iv);setTimeout(function(){showResults()},500)}
  },600);
}

/* === VEDIC ENGINE === */

    +sb('Career',p.scores.career,p.careerLevel,'fa-briefcase',lc[p.careerLevel])

  document.getElementById('resultsContent').innerHTML=h;

    secs.forEach(function(s){obs.observe(s)});
  },100);
  // Auto-speak
  setTimeout(function(){if(!speaking)speakResults(p)},1500);

/* === SPEAK RESULTS === */
async function speakResults(p){
  if(!p||!('speechSynthesis' in window))return;
  speechActive=true;
  document.getElementById('btnSpeech').classList.add('speaking-active');
  function clean(t){return t.replace(/—/g,', ').replace(/\s+/g,' ').trim()}
  var segs=[
    {t:"Namaste "+p.name+". I have completed your divine reading.",id:'sec-header'},
    {t:clean(p.summary),id:'sec-summary'},
    {t:"Now, your career. "+clean(p.career),id:'sec-career'},
    {t:"In matters of love. "+clean(p.love),id:'sec-love'},
    {t:"Your health. "+clean(p.health),id:'sec-health'},
    {t:"Your financial outlook. "+clean(p.wealth),id:'sec-wealth'},
    {t:"Your spiritual path. "+clean(p.spiritual),id:'sec-spiritual'},
    {t:"A challenge you face. "+clean(p.challenge),id:'sec-challenge'},
    {t:"Your weakest planet is "+p.weakestPlanet+". "+clean(p.remedy.r),id:'sec-remedy'},
    {t:"Your personal deity is "+p.ishta.n+". "+p.ishta.d+". Chant this mantra daily, 108 times. "+p.ishta.m,id:'sec-mantra'},
    {t:"Your lucky numbers are "+p.lucky.numbers.join(", ")+". Lucky color is "+p.lucky.color+". Lucky direction is "+p.lucky.direction+".",id:null},
    {t:"May the divine light always guide your path. Om Shanti Shanti Shanti.",id:null}
  ];
  for(var i=0;i<segs.length;i++){
    if(!speechActive)break;
    if(segs[i].id){var el=document.getElementById(segs[i].id);if(el)el.classList.add('speaking')}
    await speakText(segs[i].t);
    if(segs[i].id){var el2=document.getElementById(segs[i].id);if(el2)el2.classList.remove('speaking')}
    await new Promise(function(r){setTimeout(r,400)});
  }
  speechActive=false;
  document.getElementById('btnSpeech').classList.remove('speaking-active');
}

function restart(){
  stopSpeech();speechActive=false;
  document.getElementById('results').classList.add('hidden');
  document.getElementById('floatBar').classList.add('hidden');
  document.getElementById('landing').classList.remove('hidden');
  qIdx=0;answers={};currentPred=null;
  window.scrollTo(0,0);
}
</script>
